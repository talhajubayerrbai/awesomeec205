name: Deploy

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-asyncio httpx || true

      - name: Lint (advisory)
        run: |
          pip install flake8 || true
          flake8 . --max-line-length=120 --extend-ignore=E501,W503 || true

        continue-on-error: true
      - name: Run tests
        run: |
          pytest --tb=short -q || true

  provision:
    name: Provision
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      instance_id: ${{ steps.tf_outputs.outputs.instance_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          INSTANCE_ID=$(terraform output -raw instance_id)
          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure
    runs-on: ubuntu-latest
    needs: [provision]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Ansible and AWS SSM plugin
        run: |
          python -m pip install --upgrade pip
          pip install ansible boto3 botocore
          # Install the AWS SSM session manager plugin
          curl -sSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o /tmp/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb
          ansible-galaxy collection install community.aws amazon.aws

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Wait for SSM agent to be ready
        run: |
          INSTANCE_ID="${{ needs.provision.outputs.instance_id }}"
          echo "Waiting for SSM registration of instance ${INSTANCE_ID} ..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "None")
            echo "Attempt ${i}: SSM status = ${STATUS}"
            if [ "${STATUS}" = "Online" ]; then
              echo "SSM agent is online."
              break
            fi
            if [ "${i}" -eq 30 ]; then
              echo "ERROR: SSM agent did not come online in time."
              exit 1
            fi
            sleep 20
          done

      - name: Run Ansible playbook via SSM
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          INSTANCE_ID="${{ needs.provision.outputs.instance_id }}"
          ansible-playbook ansible/playbook.yml \
            -i "${INSTANCE_ID}," \
            -e "ansible_connection=community.aws.aws_ssm" \
            -e "ansible_aws_ssm_region=${{ secrets.AWS_REGION }}" \
            -e "ansible_aws_ssm_bucket_name=${{ secrets.TF_STATE_BUCKET }}" \
            -e "ansible_user=ubuntu" \
            -e "project_name=${{ secrets.PROJECT_NAME }}"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [configure]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get ALB DNS name
        id: get_url
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Wait for ALB to become healthy
        run: |
          APP_URL="${{ steps.get_url.outputs.app_url }}"
          echo "Waiting for app at ${APP_URL}/health ..."
          for i in $(seq 1 24); do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" "${APP_URL}/health" || echo "000")
            echo "Attempt ${i}: HTTP ${STATUS}"
            if [[ "${STATUS}" =~ ^[23] ]]; then
              echo "App is healthy."
              exit 0
            fi
            sleep 15
          done
          echo "ERROR: App did not become healthy after 6 minutes."
          exit 1

      - name: Smoke test root endpoint
        run: |-
          APP_URL="${{ steps.get_url.outputs.app_url }}"
          STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" "${APP_URL}/" || echo "000")
          echo "Root endpoint HTTP status: ${STATUS}"
          if [[ "${STATUS}" =~ ^[23] ]]; then
            echo "Smoke test passed."
          else
            echo "ERROR: Root endpoint returned ${STATUS}"
            exit 1
          fi
